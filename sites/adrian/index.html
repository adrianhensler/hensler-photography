<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Adrian Hensler Photography</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Photography from Halifax and surrounding areas by Adrian Hensler. Light, land, and life.">

  <!-- Google Fonts: Playfair Display for headings, Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@300;600&display=swap" rel="stylesheet">

  <!-- GLightbox for image lightbox -->
  <link rel="stylesheet" href="/shared/vendor/glightbox/glightbox.min.css">

  <!-- Shared gallery styles (hero, category row, justified grid) -->
  <link rel="stylesheet" href="/shared/gallery.css?v=20260705">

  <style>
    /* Base & Layout */
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      line-height: 1.6;
    }

    /* About + contact */
    .about {
      max-width: 640px;
      margin: 0 auto;
      padding: clamp(32px, 6vh, 72px) 24px;
      text-align: center;
    }

    .about h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 300;
      font-size: clamp(24px, 3.4vw, 32px);
      letter-spacing: 0.08em;
      text-transform: lowercase;
      opacity: 0.5;
      margin: 0 0 18px;
    }

    .about p {
      margin: 0 0 20px;
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.7;
      color: rgba(245, 245, 245, 0.88);
    }

    .about a {
      color: #e8d5b5;
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 213, 181, 0.3);
      transition: border-color 0.2s ease;
    }

    .about a:hover {
      border-bottom-color: #e8d5b5;
    }

    .about .nav-link {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 300;
      font-size: clamp(14px, 2vw, 16px);
      letter-spacing: 0.06em;
      color: rgba(245, 245, 245, 0.4);
      border-bottom: 1px solid transparent;
      text-transform: lowercase;
      padding-bottom: 2px;
    }

    .about .nav-link:hover {
      color: rgba(232, 213, 181, 0.7);
      border-bottom-color: rgba(232, 213, 181, 0.3);
    }

    /* Footer */
    footer {
      padding: 32px 24px 40px;
      font-size: 0.875rem;
      color: #888;
      letter-spacing: 0.03em;
      text-align: center;
    }

    footer .elsewhere {
      margin-bottom: 10px;
    }

    footer .elsewhere a {
      color: rgba(245, 245, 245, 0.45);
      text-decoration: none;
      text-transform: lowercase;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
      margin: 0 8px;
    }

    footer .elsewhere a:hover {
      color: rgba(232, 213, 181, 0.8);
      border-bottom-color: rgba(232, 213, 181, 0.3);
    }
  </style>
  <meta property="og:title" content="Adrian Hensler Photography">
  <meta property="og:description" content="Photography from Halifax and surrounding areas. Light, land, and life.">
  <meta property="og:image" content="/assets/adrian-hero.jpg">
  <meta property="og:type" content="website">
</head>
<body>
  <!-- Full-bleed hero slideshow with overlaid ghost title -->
  <header class="hero">
    <div class="slideshow-container" id="slideshow">
      <!-- Slides inserted by gallery.js -->
    </div>
    <div class="slideshow-prev slideshow-nav" role="button" aria-label="Previous image" tabindex="0">‹</div>
    <div class="slideshow-next slideshow-nav" role="button" aria-label="Next image" tabindex="0">›</div>
    <div class="hero-title">
      <h1>adrian hensler</h1>
      <p class="subtitle">photography</p>
    </div>
  </header>

  <main>
    <!-- Public gallery: category row + justified grid -->
    <section class="gallery" aria-label="Photo gallery">
      <nav class="category-nav" id="category-nav" aria-label="Gallery categories" hidden>
        <!-- Category links inserted by gallery.js -->
      </nav>
      <div class="gallery-grid" id="gallery-grid">
        <!-- Gallery items inserted by gallery.js -->
      </div>
    </section>

    <!-- About + contact -->
    <section class="about" aria-label="About">
      <h2>about</h2>
      <p>Images from Halifax and surrounding areas. Light, land, and life.</p>
      <p><a href="mailto:adrianhensler@gmail.com">adrianhensler@gmail.com</a></p>
      <p><a href="/about" class="nav-link">more about this site</a></p>
    </section>
  </main>

  <footer>
    <div class="elsewhere">
      elsewhere:
      <a href="https://www.flickr.com/photos/adrianhensler/" rel="me noopener" target="_blank">flickr</a>
    </div>
    © <span id="y"></span> Adrian Hensler
  </footer>

  <!-- Initialize year -->
  <script>document.getElementById('y').textContent=new Date().getFullYear()</script>

  <!-- GLightbox -->
  <script src="/shared/vendor/glightbox/glightbox.min.js"></script>

  <!-- Configure gallery for Adrian (MUST be before gallery.js loads) -->
  <script>
    window.GALLERY_CONFIG = {
      userId: 1,
      siteName: 'Adrian Hensler'
    };
  </script>

  <!-- Shared gallery application (slideshow, gallery, analytics, filtering) -->
  <script src="/shared/gallery.js?v=20260705"></script>

  <script>
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      GalleryApp.init();
    });
  </script>
</body>
</html>
